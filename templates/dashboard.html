<!-- [Hridoy] - Users can view the status of all their campaigns -->
<!-- [Siam] - Edit and cancel buttons shown only for pending campaigns -->
<!-- [Hridoy] - Rejected status is visible to the creator here -->

{% extends "base.html" %}
{% block content %}

<h2>My Campaigns</h2>
<a href="/create"><button>Create Campaign</button></a>  <!-- [Saad] - Button to go create a new campaign -->

{% for campaign in campaigns %}
<div class="card">
    <h3>
        <!--  [Hridoy] - Campaign title links to the detail page -->
        <a href="{{ url_for('campaign_details_route', id=campaign.id) }}">{{ campaign.title }}</a>
    </h3>

    
    <!-- [Hridoy] - Show current campaign status  -->
    <!-- [Hridoy] - "rejected" status displayed here when admin rejects -->
    <p>Status: {{ campaign.status }}</p>

    <p>Goal: ৳ {{ campaign.goal_amount }}</p>
    <p>Category: {{ campaign.category }}</p>

    <!-- [Siam] - Edit and cancel only available while campaign is still pending -->
    {% if campaign.status == "pending" %}
        <a href="/edit/{{ campaign.id }}">
            <button>Edit</button>    <!-- [Siam] - Edit button -->
        </a>
        <a href="/cancel/{{ campaign.id }}">
            <button>Cancel</button>  <!-- [Siam] - Cancel button -->
        </a>
    {% endif %}
</div>
{% endfor %}

{% endblock %}
