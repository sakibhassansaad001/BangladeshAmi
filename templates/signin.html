<!-- [Saad] - Creates signin template as part of the main auth flow -->

{% extends "base.html" %}
{% block content %}

<h2>Sign In</h2>

<form method="POST">
    <input type="email" name="email" placeholder="Email" required>           <!-- [Saad] - Email field -->
    <input type="password" name="password" placeholder="Password" required>  <!-- [Saad] - Password field -->
    <button type="submit">Login</button>                                      <!-- [Saad] - Submit login -->
</form>

{% endblock %}
