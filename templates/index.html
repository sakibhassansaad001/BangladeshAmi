<!--  [Hridoy] - Approved campaigns are visible to all users here -->

{% extends "base.html" %}
{% block content %}

<h1>Approved Campaigns</h1>  <!--  [Saad] - Only approved campaigns are shown -->

{% for campaign in campaigns %}
<div class="card">
    <!--  [Hridoy] - Each approved campaign is displayed with a link to its details -->
    <h3>
        <a href="/campaign/{{ campaign.id }}">{{ campaign.title }}</a>
    </h3>
    <p>{{ campaign.description }}</p>
    <p><strong>Goal:</strong> ৳ {{ campaign.goal_amount }}</p>
    <p><strong>Category:</strong> {{ campaign.category }}</p>
    <p><strong>Duration:</strong> {{ campaign.duration }} days</p>
</div>
{% endfor %}

{% endblock %}
